name: Update Menu

on:
  schedule:
    # Ogni giorno alle 00:01 CET (23:01 UTC, equivale a 00:01 ora italiana invernale)
    - cron: '1 23 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-menu:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Scrape full menu from scratch
        run: python scripts/extract_menu.py

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet data/menu.json; then
            echo "Nessuna modifica rilevata in menu.json"
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            echo "Modifiche rilevate in menu.json"
            echo "changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add data/menu.json
          git commit -m "chore: aggiornamento automatico menu [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
