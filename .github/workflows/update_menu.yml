name: Update Menu

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-menu:
    runs-on: ubuntu-latest
    env:
      TZ: "Europe/Rome"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Aggiorna menu da oggi in poi
        run: python scripts/smart_update.py

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet data/menu.json && git diff --quiet data/menu_today.json 2>/dev/null && git diff --quiet data/menu_today.min.json 2>/dev/null; then
            echo "Nessuna modifica rilevata"
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            echo "Modifiche rilevate"
            echo "changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add data/menu.json data/menu_today.json data/menu_today.min.json
          git commit -m "chore: aggiornamento menu $(date '+%Y-%m-%d') [auto]"
          git push
