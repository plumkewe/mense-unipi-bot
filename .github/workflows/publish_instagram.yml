name: Publish Menu to Instagram

on:
  # Triggerato da Cloudflare Worker (vedere cloudflare-worker/)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-instagram:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install requests

      # Le immagini sono pre-generate e committate in assets/posts/
      - name: Publish to Instagram
        env:
          # Token ufficiale Instagram Graph API (da GitHub Secrets)
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          # Indica se il workflow è stato lanciato manualmente (per ignorare il lock)
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          python scripts/publish_instagram.py

      - name: Commit publish lock
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Instagram auto-publish completed"
          file_pattern: 'assets/posts/*.lock'
          skip_dirty_check: false
          skip_fetch: true
