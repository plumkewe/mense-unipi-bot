name: Publish Menu to Instagram

on:
  schedule:
    # Esegue automaticamente ogni giorno alle 09:21 CET (08:21 UTC)
    - cron: '21 8 * * *'
  # Permette di lanciare l'azione manualmente
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-instagram:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements-actions.txt

      # Le immagini sono pre-generate e committate in assets/posts/
      - name: Publish to Instagram
        env:
          # Assicurati di aver censurato questo e messo i token nelle GitHub Secrets
          IG_USERNAME: ${{ secrets.IG_USERNAME }}
          IG_PASSWORD: ${{ secrets.IG_PASSWORD }}
          IG_SESSION: ${{ secrets.IG_SESSION }}
        run: |
          python scripts/publish_instagram.py

      - name: Commit publish lock
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Instagram auto-publish completed"
          file_pattern: 'assets/posts/*.lock'
          skip_dirty_check: false
          skip_fetch: true
