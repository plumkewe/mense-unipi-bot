name            = "mense-unipi-bot-scheduler"
main            = "src/index.js"
compatibility_date = "2025-01-01"

# Cron triggers in UTC.
# Ogni orario italiano ha due entry (CET = UTC+1, CEST = UTC+2)
# Il Worker controlla l'ora italiana reale prima di triggerare.
#
#   update_menu.yml     → 00:00 IT  →  23:00 CET / 22:00 CEST
#   generate_images.yml → 01:21 IT  →  00:21 CET / 23:21 CEST (giorno prec.)
#   publish_instagram   → 09:20 IT  →  08:20 CET / 07:20 CEST

# I cron vengono aggiornati automaticamente dalla GitHub Action dst_update.yml
# ogni volta che cambia l'ora (ultima domenica di marzo/ottobre).
# CET (inverno, UTC+1): 3 trigger | CEST (estate, UTC+2): 3 trigger diversi
[triggers]
crons = [
  "0 22 * * *",    # update_menu       — CEST (estate, 00:00 IT)
  "21 23 * * *",   # generate_images   — CEST (estate, 01:21 IT)
  "17 7 * * *",    # publish_instagram — CEST (estate, 09:17 IT)
]